<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Campus — Consommation d'eau</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    canvas { display: block; }

    /* TOP BAR */
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; height: 56px;
      background: rgba(10,10,30,0.92); display: flex; align-items: center;
      padding: 0 20px; gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 10;
    }
    #topbar h1 { color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; flex-shrink: 0; }

    /* MODE BUTTONS */
    #mode-buttons { display: flex; gap: 8px; }
    .mode-btn {
      padding: 7px 16px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05); color: #aaa;
      font-size: 12px; cursor: pointer;
      transition: all 0.2s; font-family: 'Segoe UI', sans-serif;
      white-space: nowrap;
    }
    .mode-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .mode-btn.active { background: #7ecfff; color: #1a1a2e; border-color: #7ecfff; font-weight: 700; }

    /* LEGEND */
    #legend {
      position: absolute; bottom: 24px; left: 20px;
      background: rgba(10,10,30,0.88); border-radius: 10px;
      padding: 14px 18px; z-index: 10;
      border: 1px solid rgba(255,255,255,0.08);
      min-width: 210px; transition: all 0.3s;
    }
    #legend h3 { color: #aaa; font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 10px; }
    .legend-bar {
      width: 180px; height: 12px; border-radius: 6px;
      background: linear-gradient(to right, #00aaff, #00ff88, #ffdd00, #ff2200);
      margin-bottom: 6px;
    }
    .legend-labels { display: flex; justify-content: space-between; color: #aaa; font-size: 11px; }
    .legend-item { display: flex; align-items: center; gap: 8px;
      color: #ccc; font-size: 12px; margin-top: 7px; }
    .legend-dot { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

    /* POPUP */
    #popup {
      position: absolute; top: 70px; right: 20px; width: 290px;
      background: rgba(10,10,30,0.95); border-radius: 12px; padding: 20px;
      border: 1px solid rgba(126,207,255,0.25); z-index: 10; display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #popup .close-btn { position: absolute; top: 12px; right: 14px;
      color: #666; cursor: pointer; font-size: 20px; line-height: 1; }
    #popup .close-btn:hover { color: #fff; }
    #popup h2 { color: #7ecfff; font-size: 15px; margin-bottom: 4px;
      padding-right: 24px; line-height: 1.3; }
    #popup .bid { color: #555; font-size: 11px; margin-bottom: 14px; }
    #popup .row { display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    #popup .row:last-child { border-bottom: none; }
    #popup .label { color: #888; font-size: 12px; }
    #popup .value { color: #fff; font-size: 12px; font-weight: 500; text-align: right; max-width: 165px; }
    #popup .conso-big { color: #7ecfff; font-size: 26px; font-weight: 700; }
    #popup .conso-unit { color: #555; font-size: 11px; margin-top: 2px; }
    .bar-wrap { margin-top: 10px; }
    .bar-label { display: flex; justify-content: space-between; color: #888; font-size: 11px; margin-bottom: 4px; }
    .bar-bg { background: rgba(255,255,255,0.07); border-radius: 4px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; color: #fff; }

    /* HINT */
    #hint { position: absolute; bottom: 24px; right: 20px;
      color: rgba(255,255,255,0.25); font-size: 11px; z-index: 10;
      text-align: right; line-height: 2; }

    /* LOADING */
    #loading { position: absolute; inset: 0; background: #1a1a2e;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 100; gap: 20px; }
    #loading h2 { color: #7ecfff; font-size: 18px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(126,207,255,0.2);
      border-top-color: #7ecfff; border-radius: 50%;
      animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading">
  <h2>Chargement du campus…</h2>
  <div class="spinner"></div>
</div>

<div id="topbar">
  <h1>🏛️ Campus Universitaire</h1>
  <div id="mode-buttons">
    <button class="mode-btn active" onclick="setMode('conso')">💧 Consommation</button>
    <button class="mode-btn" onclick="setMode('etablissement')">🏫 Établissement</button>
    <button class="mode-btn" onclick="setMode('fonction')">🔧 Fonction</button>
  </div>
</div>

<div id="legend">
  <!-- filled dynamically -->
</div>

<div id="popup">
  <span class="close-btn" onclick="closePopup()">×</span>
  <h2 id="p-nom"></h2>
  <div class="bid" id="p-id"></div>
  <div class="row"><span class="label">Établissement</span><span class="value" id="p-etab"></span></div>
  <div class="row"><span class="label">Fonction</span><span class="value"><span class="tag" id="p-type"></span></span></div>
  <div class="row"><span class="label">Dossier</span><span class="value" id="p-dossier"></span></div>
  <div class="row" style="flex-direction:column;align-items:flex-start;gap:2px;margin-top:6px;">
    <div class="conso-big" id="p-conso2019"></div>
    <div class="conso-unit">m³ consommés en 2019</div>
  </div>
  <div class="bar-wrap">
    <div class="bar-label"><span>2018</span><span id="p-val2018"></span></div>
    <div class="bar-bg"><div class="bar-fill" id="p-bar2018" style="background:#4a9eff;"></div></div>
  </div>
  <div class="bar-wrap" style="margin-top:8px;">
    <div class="bar-label"><span>2019</span><span id="p-val2019"></span></div>
    <div class="bar-bg"><div class="bar-fill" id="p-bar2019" style="background:#7ecfff;"></div></div>
  </div>
</div>

<div id="hint">
  🖱️ Clic gauche : rotation<br>
  🖱️ Clic droit : déplacer<br>
  🖱️ Molette : zoom
</div>

const ETABLISSEMENT_LABELS = {
  'UB': 'Université de Bordeaux',

};

  'ENSEG': 'Enseignement',
  'RECHE': 'Recherche',
  'SPORT': 'Sport',
  'RESTO': 'Restauration',
  'BIBLIO': 'Bibliothèque',

// ── COLOR FUNCTIONS ───────────────────────────────────────────────────────────
function consoToColor(value) {
  if (value <= 0) return new THREE.Color(0x555566);
  const t = Math.min(value / MAX_CONSO, 1);
  const c = new THREE.Color();
  if (t < 0.33) c.lerpColors(new THREE.Color(0x00aaff), new THREE.Color(0x00ff88), t / 0.33);
  else if (t < 0.66) c.lerpColors(new THREE.Color(0x00ff88), new THREE.Color(0xffdd00), (t-0.33)/0.33);
  else c.lerpColors(new THREE.Color(0xffdd00), new THREE.Color(0xff2200), (t-0.66)/0.34);
  return c;
}

function getColorForMode(data, mode) {
  if (mode === 'conso') return consoToColor(data.conso2019);
  if (mode === 'etablissement') {
    const hex = ETABLISSEMENT_COLORS[data.etablissement] || '#555566';
    return new THREE.Color(hex);
  }
  if (mode === 'fonction') {
    const hex = FONCTION_COLORS[data.type] || '#555566';
    return new THREE.Color(hex);
  }
  return new THREE.Color(0x555566);
}

function typeColor(type) {
  return FONCTION_COLORS[type] || '#7f8c8d';
}

// ── LEGEND BUILDER ────────────────────────────────────────────────────────────
function updateLegend(mode) {
  const el = document.getElementById('legend');
  if (mode === 'conso') {
    el.innerHTML = `
      <h3>Consommation 2019 (m³)</h3>
      <div class="legend-bar"></div>
      <div class="legend-labels"><span>0</span><span>Faible</span><span>Élevée</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#555566;"></div><span>Pas de données 2019</span></div>
    `;
  } else if (mode === 'etablissement') {
    const entries = Object.entries(ETABLISSEMENT_COLORS);
    el.innerHTML = `<h3>Établissement</h3>` +
      entries.map(([key, color]) =>
        `<div class="legend-item"><div class="legend-dot" style="background:${color};"></div><span>${ETABLISSEMENT_LABELS[key] || key}</span></div>`
      ).join('');
  } else if (mode === 'fonction') {
    const entries = Object.entries(FONCTION_COLORS);
    el.innerHTML = `<h3>Fonction</h3>` +
      entries.map(([key, color]) =>
        `<div class="legend-item"><div class="legend-dot" style="background:${color};"></div><span>${FONCTION_LABELS[key] || key}</span></div>`
      ).join('');
  }
}

// ── SCENE ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 2000, 6000);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 10000);
camera.position.set(0, 300, 500);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 20;
controls.maxDistance = 2000;
controls.maxPolarAngle = Math.PI / 2.1;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xfff5e0, 1.5);
sun.position.set(200, 400, 200);
sun.castShadow = true;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xaaccff, 0.4);
fill.position.set(-200, 100, -200);
scene.add(fill);

// ── STATE ──────────────────────────────────────────────────────────────────────
let currentMode = 'conso';
let clickableMeshes = [];
let selectedMesh = null;
let originalMaterials = new Map(); // mesh → material per mode
let meshDataMap = new Map();       // mesh → bid

const highlightMat = new THREE.MeshStandardMaterial({
  color: 0xffffff, emissive: 0x7ecfff, emissiveIntensity: 0.5,
  roughness: 0.3, metalness: 0.1
});

// ── MODE SWITCH ────────────────────────────────────────────────────────────────
window.setMode = function(mode) {
  currentMode = mode;

  // Update button styles
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  // Close popup and deselect
  closePopup();

  // Recolor all building meshes
  clickableMeshes.forEach(mesh => {
    const bid = meshDataMap.get(mesh);
    if (bid && waterData[bid]) {
      const color = getColorForMode(waterData[bid], mode);
      mesh.material.color.copy(color);
    }
  });

  // Update legend
  updateLegend(mode);
};

// ── RAYCASTING ────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let mouseDown = { x: 0, y: 0 };

renderer.domElement.addEventListener('mousedown', (e) => { mouseDown = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('mouseup', (e) => {
  if (Math.abs(e.clientX - mouseDown.x) > 5 || Math.abs(e.clientY - mouseDown.y) > 5) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickableMeshes, false);
  if (hits.length > 0) {
    const mesh = hits[0].object;
    const bid = meshDataMap.get(mesh);
    if (bid) {
      if (selectedMesh && originalMaterials.has(selectedMesh)) {
        selectedMesh.material = originalMaterials.get(selectedMesh);
      }
      selectedMesh = mesh;
      originalMaterials.set(mesh, mesh.material);
      mesh.material = highlightMat;
      showPopup(bid);
    }
  } else {
    closePopup();
  }
});

// ── LOAD MODEL ────────────────────────────────────────────────────────────────
const loader = new GLTFLoader();
loader.load('campus2026.glb', (gltf) => {
  const model = gltf.scene;
  scene.add(model);

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  controls.target.copy(center);
  camera.position.set(center.x, center.y + maxDim * 0.8, center.z + maxDim);
  controls.update();

  model.traverse((node) => {
    if (!node.isMesh) return;
    let ancestor = node, bid = null;
    while (ancestor) {
      if (waterData[ancestor.name]) { bid = ancestor.name; break; }
      ancestor = ancestor.parent;
    }
    if (bid) {
      const color = getColorForMode(waterData[bid], currentMode);
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.55, metalness: 0.05 });
      node.material = mat;
      node.userData.buildingId = bid;
      node.castShadow = true;
      node.receiveShadow = true;
      clickableMeshes.push(node);
      meshDataMap.set(node, bid);
      originalMaterials.set(node, mat);
    } else {
      node.material = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.95 });
    }
  });

  updateLegend(currentMode);
  document.getElementById('loading').style.display = 'none';

}, undefined, (err) => {
  document.getElementById('loading').innerHTML =
    '<h2 style="color:#ff4444">Erreur de chargement</h2><p style="color:#aaa;margin-top:10px">Vérifiez que campus2026.glb est dans le même dossier.</p>';
});

// ── POPUP ─────────────────────────────────────────────────────────────────────
function showPopup(bid) {
  const d = waterData[bid];
  document.getElementById('p-nom').textContent = d.nom;
  document.getElementById('p-id').textContent = bid + ' · ' + d.code;
  document.getElementById('p-etab').textContent = d.etablissement;
  document.getElementById('p-type').textContent = FONCTION_LABELS[d.type] || d.type;
  document.getElementById('p-type').style.background = typeColor(d.type);
  document.getElementById('p-dossier').textContent = d.dossier.replace(/_/g,' ');
  document.getElementById('p-conso2019').textContent = d.conso2019.toLocaleString('fr-FR');
  document.getElementById('p-val2018').textContent = d.conso2018.toLocaleString('fr-FR') + ' m³';
  document.getElementById('p-val2019').textContent = d.conso2019.toLocaleString('fr-FR') + ' m³';
  document.getElementById('p-bar2018').style.width = (d.conso2018 / MAX_CONSO * 100) + '%';
  document.getElementById('p-bar2019').style.width = (d.conso2019 / MAX_CONSO * 100) + '%';
  document.getElementById('popup').style.display = 'block';
}

window.closePopup = () => {
  if (selectedMesh && originalMaterials.has(selectedMesh)) {
    selectedMesh.material = originalMaterials.get(selectedMesh);
    selectedMesh = null;
  }
  document.getElementById('popup').style.display = 'none';
};

// ── RESIZE & LOOP ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
